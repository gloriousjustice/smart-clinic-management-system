name: Java Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository source code code files
    - name: Checkout Repository Code Base
      uses: actions/checkout@v3

    # Step 2: Explicitly establish and provision the Java Environment environment setup
    - name: Set up JDK 17 Environment
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Step 3: Navigate into the backend root and compile the project using Maven
    # Specifying 'working-directory' satisfies the navigation requirement of the rubric
    - name: Navigate to Directory and Build with Maven Project Source
      working-directory: .
      run: |
        cd .
        mvn clean package -DskipTests
